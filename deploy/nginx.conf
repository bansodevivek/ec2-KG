# ==============================================================================
# nginx.conf — Containerized Reverse Proxy
# EV Telematics Platform | Production
#
# Responsibilities:
#   1. Serve the React SPA on / with browser history fallback
#   2. Reverse-proxy /api/ and /admin/ to the Django Gunicorn container
#   3. Reverse-proxy /ws/ WebSocket connections to Django Channels
#   4. Serve Django's collected static files with aggressive caching
# ==============================================================================

upstream django_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Limits ───────────────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── React SPA ────────────────────────────────────────────────────────────
    # Serve the built React app. try_files handles browser-history routing
    # by falling back to index.html for any path that isn't a real file.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (Vite hashes filenames)
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Django API Proxy ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # ── Django Admin Proxy ───────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Django Static Files (admin CSS/JS, DRF browsable API) ────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── WebSocket Proxy (Django Channels) ────────────────────────────────────
    location /ws/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # ── Health Check Endpoint ────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}