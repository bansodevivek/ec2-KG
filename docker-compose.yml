# ==============================================================================
# docker-compose.yml — EV Telematics Platform
# Full-stack orchestration: TimescaleDB + Redis + Django + Celery + MQTT + Nginx
# ==============================================================================

services:

  # ── TimescaleDB (PostgreSQL with time-series extensions) ──────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: kg-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"    # Bind to localhost only (not exposed to internet)
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - kg-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis (Celery broker + Django cache + Channels layer) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: kg-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kg-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Django Backend (Gunicorn) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kg-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=DjangoProject.settings
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
    volumes:
      - backend_static:/app/staticfiles
      - backend_logs:/app/logs
    networks:
      - kg-internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker (async task processing) ─────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kg-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=DjangoProject.settings
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
    command: >
      celery -A DjangoProject worker
      --loglevel=info
      --concurrency=2
      --queues=mqtt,batch,monitoring,celery
      --max-tasks-per-child=500
    volumes:
      - backend_logs:/app/logs
    networks:
      - kg-internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (periodic task scheduler) ─────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kg-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=DjangoProject.settings
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
    command: >
      celery -A DjangoProject beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    volumes:
      - backend_logs:/app/logs
    networks:
      - kg-internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── MQTT Listener (ingestion service) ─────────────────────────────────────
  mqtt-listener:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kg-mqtt-listener
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=DjangoProject.settings
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
    command: python manage.py mqtt_listener
    volumes:
      - backend_logs:/app/logs
    networks:
      - kg-internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx + React Frontend (reverse proxy + SPA) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kg-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/app/staticfiles:ro
    networks:
      - kg-internal
    depends_on:
      - backend

# ── Persistent Volumes ────────────────────────────────────────────────────────
volumes:
  timescaledb_data:
    driver: local
  redis_data:
    driver: local
  backend_static:
    driver: local
  backend_logs:
    driver: local

# ── Internal Network ─────────────────────────────────────────────────────────
networks:
  kg-internal:
    driver: bridge
